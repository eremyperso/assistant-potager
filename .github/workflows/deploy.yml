name: Deploy Production
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Assistant Potager
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SCALEWAY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SCALEWAY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code on server
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} "
            set -euo pipefail
            if [ ! -d /opt/potager-prod/.git ]; then
              echo 'Premier déploiement — initialisation git sur place...'
              cd /opt/potager-prod
              git init
              git remote add origin https://github.com/eremyperso/assistant-potager.git
              git fetch origin main --depth=1
              git reset --hard origin/main
              git checkout main
            else
              cd /opt/potager-prod
              git fetch origin
              git checkout main
              git pull origin main
            fi
          "

      - name: Install Python dependencies
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} "
            set -euo pipefail
            cd /opt/potager-prod
            if [ ! -x venv/bin/python ]; then
              echo 'Création du virtualenv...'
              rm -rf venv
              python3 -m venv venv
            fi
            venv/bin/python -m pip install --quiet --upgrade pip
            venv/bin/python -m pip install --quiet -r requirements.txt
          "

      - name: Build frontend React
        run: |
          cd frontend
          echo "VITE_API_URL=https://potager.eremy.fr" > .env.local
          npm install
          npm run build

      - name: Deploy frontend dist to server
        run: |
          rsync -az --delete frontend/dist/ \
            ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }}:/opt/potager-prod/frontend/dist/

      - name: Setup PostgreSQL extensions
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} "
            sudo -u postgres psql -d potager_prod -c 'CREATE EXTENSION IF NOT EXISTS unaccent;'
          "

      - name: Apply SQL migrations
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} "
            set -euo pipefail
            cd /opt/potager-prod
            set -a && source .env.prod && set +a
            APPLIED_LOG=/opt/potager-prod/.migrations_applied
            touch \"\${APPLIED_LOG}\"
            for migration in \$(ls migrations/migration_v*.sql | sort -t v -k2 -n); do
              name=\$(basename \"\${migration}\")
              if grep -qF \"\${name}\" \"\${APPLIED_LOG}\"; then
                echo \"  [-] \${name} (déjà appliquée)\"
                continue
              fi
              echo \"  >>> Applying \${migration}...\"
              psql \"\${DATABASE_URL}\" -v ON_ERROR_STOP=1 -f \"\${migration}\"
              echo \"\${name}\" >> \"\${APPLIED_LOG}\"
            done
          "

      - name: Install systemd services (API + Bot)
        run: |
          scp infra/potager-prod.service \
            ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }}:/etc/systemd/system/potager-prod.service
          scp infra/potager-prod-bot.service \
            ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }}:/etc/systemd/system/potager-prod-bot.service
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} \
            "systemctl daemon-reload && systemctl enable potager-prod.service potager-prod-bot.service"

      - name: Restart systemd services (API + Bot)
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} "
            fuser -k 8000/tcp || true
            sleep 1
            sudo systemctl restart potager-prod.service
            sudo systemctl restart potager-prod-bot.service
          "

      - name: Smoke test
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} "
            set -euo pipefail
            echo 'Attente stabilisation du service (10s)...'
            sleep 10
            status=\$(systemctl is-active potager-prod.service || true)
            if [ \"\${status}\" = 'active' ]; then
              echo 'Déploiement réussi — @AssistantPotagerBot actif'
            else
              echo \"ERREUR: service potager-prod.service non actif (status: \${status})\"
              systemctl status potager-prod.service --no-pager
              exit 1
            fi
          "

      - name: Update deploy history
        if: always()
        run: |
          ssh ${{ secrets.SCALEWAY_USER }}@${{ secrets.SCALEWAY_HOST }} "
            STATUS='success'
            if [ '${{ job.status }}' != 'success' ]; then STATUS='failure'; fi
            echo \"\$(date -u +%Y-%m-%dT%H:%M:%SZ) branch=main commit=${{ github.sha }} actor=${{ github.actor }} status=\${STATUS}\" \
              >> /opt/potager-prod/.deploy_history
          "
